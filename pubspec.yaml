name: nexus
description: "Nexus - Interactive Learning Platform."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  logger: ^2.6.2
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  hooks_riverpod: ^3.2.1
  flutter_hooks: ^0.21.3+1
  # riverpod_annotation: ^2.6.1
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  flutter_dotenv: ^6.0.0
  flutter_lints: ^6.0.0
  # flutter_markdown: ^0.7.6
  flutter_markdown_plus: ^1.0.7
  intl: ^0.20.2
  flutter_skeleton_ui: ^0.0.6
  flutter_debouncer: ^2.1.1
  fl_chart: ^0.68.0
  flex_color_scheme: ^8.4.0
  convex_bottom_bar: ^3.2.0
  random_avatar: ^0.0.8
  go_router: ^17.2.2
  go_router_builder: ^4.3.0
  go_router_paths: ^0.2.2
  flutter_quiz_matcher: ^0.0.4

dev_dependencies:
  build_runner: ^2.11.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/splash_logo.png"
  android_12:
    image: "assets/images/splash_logo.png"
    color: "#FFFFFF"
  fullscreen: true
  web_image_mode: center



